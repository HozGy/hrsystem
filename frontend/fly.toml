app = "hrsystem"
primary_region = "sin"

[build]
  dockerfile = "./Dockerfile"

[env]
  NODE_ENV = "production"

[[services]]
  internal_port = 3000
  processes = ["app"]
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    grace_period = "1s"
    interval = "15s"
    timeout = "2s"

[http_service]
  internal_port = 3000

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
