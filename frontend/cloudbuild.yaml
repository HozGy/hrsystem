steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/hrsystem:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/hrsystem:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/hrsystem:$SHORT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - 'run'
      - '--filename=.'
      - '--image=gcr.io/$PROJECT_ID/hrsystem:$SHORT_SHA'
      - '--location=us-central1'
  
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'hrsystem'
      - '--image=gcr.io/$PROJECT_ID/hrsystem:$SHORT_SHA'
      - '--platform=managed'
      - '--region=asia-southeast1'
      - '--allow-unauthenticated'
      - '--set-env-vars=NEXT_PUBLIC_SUPABASE_URL=${_SUPABASE_URL},NEXT_PUBLIC_SUPABASE_ANON_KEY=${_SUPABASE_KEY},MONGODB_URI=${_MONGODB_URI}'

images:
  - 'gcr.io/$PROJECT_ID/hrsystem:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/hrsystem:latest'

